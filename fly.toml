app = "prd-to-prod-console"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "development"
  HOST = "0.0.0.0"
  CONSOLE_PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[mounts]
  source = "console_data"
  destination = "/data"
