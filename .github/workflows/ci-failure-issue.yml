#
# CI Failure Router — Routes failing PR CI runs and failing main-branch deploy
# runs back into the repair loop instead of creating duplicate backlog issues.
#
# Flow:
#   1. Node CI fails on a PR or the main deploy run fails →
#      workflow_run:completed fires with conclusion=failure
#   2. Router fetches failed-step logs and normalizes the failure signature
#   3. For open [Pipeline] PRs with a linked source issue, router upserts PR state
#      and posts a structured repair command to the linked issue
#   4. Router creates a standalone [CI Incident] issue only for fallback/escalation
#      cases (no PR, non-pipeline PR, missing linked issue, dispatch failure)
#

name: "CI Failure Router"

on:
  workflow_run:
    workflows: ["Node CI", "Deploy Router", "Pipeline Scripts CI"]
    types: [completed]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: "ci-failure-router-${{ github.event.workflow_run.id }}"
  cancel-in-progress: false

jobs:
  route-failure:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    timeout-minutes: 15
    env:
      PIPELINE_HEALING_ENABLED: ${{ vars.PIPELINE_HEALING_ENABLED }}
    steps:
      - name: Checkout repository helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 50

      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/healing-control.sh
            scripts/classify-ci-failure.sh
          sparse-checkout-cone-mode: false
          path: .workflow-helpers

      - name: Check healing pause switch
        id: healing
        run: |
          if .workflow-helpers/scripts/healing-control.sh is-enabled; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "paused=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "paused=true" >> "$GITHUB_OUTPUT"
            echo "Autonomous healing is paused via PIPELINE_HEALING_ENABLED."
          fi

      - name: Route failing CI run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_AW_GITHUB_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          HEALING_PAUSED: ${{ steps.healing.outputs.paused }}
          PULL_REQUESTS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail

          STATE_MARKER='<!-- ci-repair-state:v1'
          COMMAND_MARKER='<!-- ci-repair-command:v1'
          NOW_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LABEL_NAMES=$(gh label list --repo "$REPO" --limit 200 | awk '{print $1}')

          has_label() {
            local label=$1
            printf '%s\n' "$LABEL_NAMES" | grep -qx "$label"
          }

          add_pr_label() {
            local label=$1
            if has_label "$label"; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$label" >/dev/null 2>&1 || \
                echo "::warning::Could not add label '$label' to PR #${PR_NUMBER}"
            else
              echo "::warning::Label '$label' is missing from the repository"
            fi
          }

          remove_pr_label() {
            local label=$1
            if has_label "$label"; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$label" >/dev/null 2>&1 || true
            fi
          }

          add_issue_label() {
            local issue_number=$1
            local label=$2
            if has_label "$label"; then
              gh issue edit "$issue_number" --repo "$REPO" --add-label "$label" >/dev/null 2>&1 || \
                echo "::warning::Could not add label '$label' to issue #${issue_number}"
            fi
          }

          read_marker_field() {
            local body=$1
            local field=$2
            printf '%s\n' "$body" | sed -n "s/^${field}=//p" | head -1
          }

          find_marker_comments() {
            local item_number=$1
            local marker=$2
            gh api "/repos/${REPO}/issues/${item_number}/comments?per_page=100" 2>/dev/null \
              | jq -c --arg marker "$marker" '[.[] | select(.body | contains($marker))]' || echo '[]'
          }

          find_marker_comment() {
            local item_number=$1
            local marker=$2
            local workflow_name=$3
            local comments_json
            comments_json=$(find_marker_comments "$item_number" "$marker")
            printf '%s' "$comments_json" | jq -c --arg workflow_name "$workflow_name" \
              '[.[] | select(.body | contains("workflow_name=" + $workflow_name))] | last // {}'
          }

          sync_pr_repair_labels() {
            local comments_json comment body status
            local has_active=false
            local has_in_progress=false
            local has_escalated=false
            comments_json=$(find_marker_comments "$PR_NUMBER" "$STATE_MARKER")

            while IFS= read -r comment; do
              [ -z "$comment" ] && continue
              body=$(printf '%s' "$comment" | jq -r '.body // empty')
              status=$(read_marker_field "$body" status)
              case "$status" in
                ""|resolved|superseded)
                  ;;
                escalated)
                  has_active=true
                  has_escalated=true
                  ;;
                detected|dispatched|repairing)
                  has_active=true
                  has_in_progress=true
                  ;;
                *)
                  has_active=true
                  ;;
              esac
            done < <(printf '%s' "$comments_json" | jq -c '.[]')

            if [ "$has_active" = "true" ]; then
              add_pr_label "ci-failure"
            else
              remove_pr_label "ci-failure"
            fi

            if [ "$has_in_progress" = "true" ]; then
              add_pr_label "repair-in-progress"
            else
              remove_pr_label "repair-in-progress"
            fi

            if [ "$has_escalated" = "true" ]; then
              add_pr_label "repair-escalated"
            else
              remove_pr_label "repair-escalated"
            fi
          }

          upsert_comment() {
            local token=$1
            local item_number=$2
            local comment_id=$3
            local body=$4
            local payload
            payload=$(mktemp)
            jq -n --arg body "$body" '{body: $body}' > "$payload"
            if [ -n "$comment_id" ]; then
              GH_TOKEN="$token" gh api --method PATCH "/repos/${REPO}/issues/comments/${comment_id}" --input "$payload" >/dev/null
            else
              GH_TOKEN="$token" gh api --method POST "/repos/${REPO}/issues/${item_number}/comments" --input "$payload" >/dev/null
            fi
            rm -f "$payload"
          }

          extract_drill_id() {
            local commit_message drill_id
            commit_message=$(gh api "/repos/${REPO}/commits/${HEAD_SHA}" --jq '.commit.message' 2>/dev/null || echo "")
            drill_id=$(printf '%s\n' "$commit_message" | sed -n 's/.*\[drill-id:\([^]]*\)\].*/\1/p' | head -1)
            if [ -n "$drill_id" ]; then
              printf '%s' "$drill_id"
              return 0
            fi

            git log --format=%B -- PRDtoProd/Canary/DrillCanary.cs 2>/dev/null \
              | sed -n 's/.*\[drill-id:\([^]]*\)\].*/\1/p' | head -1
          }

          append_drill_metadata() {
            local body=$1
            local drill_id=$2
            if [ -z "$drill_id" ]; then
              printf '%s' "$body"
              return 0
            fi

            printf '%s\n\n%s\n%s\n%s\n%s\n%s\n' \
              "$body" \
              "<!-- self-healing-drill:v1" \
              "drill_id=${drill_id}" \
              "observed_commit=${HEAD_SHA}" \
              "observed_failure_run_id=${RUN_ID}" \
              "observed_failure_run_url=${RUN_URL}" \
              "-->"
          }

          render_state_body() {
            local status=$1
            local linked_issue=$2
            local attempt_count=$3
            local failure_type=$4
            local failure_signature=$5
            local failure_summary=$6
            local failure_excerpt=$7
            printf '%s\n' \
              "${STATE_MARKER}" \
              "status=${status}" \
              "pr_number=${PR_NUMBER}" \
              "linked_issue=${linked_issue}" \
              "head_sha=${HEAD_SHA}" \
              "head_branch=${HEAD_BRANCH}" \
              "workflow_name=${WORKFLOW_NAME}" \
              "failure_run_id=${RUN_ID}" \
              "failure_run_url=${RUN_URL}" \
              "failure_type=${failure_type}" \
              "failure_signature=${failure_signature}" \
              "attempt_count=${attempt_count}" \
              "updated_at=${NOW_ISO}" \
              "-->" \
              "## CI Repair Incident" \
              "" \
              "- **Status**: ${status}" \
              "- **Linked Issue**: #${linked_issue}" \
              "- **Run**: ${RUN_URL}" \
              "- **Branch**: \`${HEAD_BRANCH}\`" \
              "- **Head SHA**: \`${HEAD_SHA}\`" \
              "- **Workflow**: ${WORKFLOW_NAME}" \
              "- **Failure Type**: ${failure_type}" \
              "- **Failure Signature**: \`${failure_signature}\`" \
              "- **Failure Summary**: ${failure_summary}" \
              "- **Attempt Count**: ${attempt_count}" \
              "- **Last Updated**: ${NOW_ISO}" \
              "" \
              "### Failure Excerpt" \
              '```text' \
              "${failure_excerpt}" \
              '```'
          }

          render_incident_body() {
            local reason=$1
            local context_line=$2
            printf '%s\n' \
              "## CI Incident" \
              "" \
              "- **Run**: ${RUN_URL}"
            printf '%b\n' "${context_line}"
            printf '%s\n' \
              "- **Commit**: \`${HEAD_SHA}\`" \
              "- **Workflow**: ${WORKFLOW_NAME}" \
              "- **Reason**: ${reason}" \
              "- **Failure Type**: ${FAILURE_TYPE}" \
              "- **Failure Signature**: \`${FAILURE_SIGNATURE}\`" \
              "" \
              "### Failure Summary" \
              "${FAILURE_SUMMARY}" \
              "" \
              "### Failed-Step Excerpt" \
              '```text' \
              "${FAILURE_EXCERPT}" \
              '```'
            if [ -n "${PR_DIFF:-}" ]; then
              printf '%s\n' \
                "" \
                "### PR Diff" \
                '```diff' \
                "${PR_DIFF}" \
                '```'
            fi
            printf '%s\n' \
              "" \
              "> This incident was created automatically by the CI Failure Router workflow."
          }

          create_or_update_incident_issue() {
            local title=$1
            local body=$2
            local existing_issue
            local issue_args=()
            existing_issue=$(gh issue list --repo "$REPO" --state open --limit 200 --json number,title \
              | jq -r --arg title "$title" '.[] | select(.title == $title) | .number' | head -1)

            if [ -n "$existing_issue" ]; then
              if [ -n "${CATEGORY_LABEL:-}" ] && has_label "$CATEGORY_LABEL"; then
                gh issue edit "$existing_issue" --repo "$REPO" --add-label "$CATEGORY_LABEL" >/dev/null 2>&1 || true
              fi
              if [ "${CLASSIFIER_ACTION:-fix}" = "escalate" ] && has_label "needs-human"; then
                gh issue edit "$existing_issue" --repo "$REPO" --add-label "needs-human" >/dev/null 2>&1 || true
              fi
              gh issue comment "$existing_issue" --repo "$REPO" --body "$body" >/dev/null || \
                echo "::warning::Could not update existing incident issue #${existing_issue}"
              return
            fi

            for label in automation bug ci-failure "${CATEGORY_LABEL:-}"; do
              [ -n "$label" ] || continue
              if has_label "$label"; then
                issue_args+=(--label "$label")
              fi
            done
            if [ "${CLASSIFIER_ACTION:-fix}" = "escalate" ] && has_label "needs-human"; then
              issue_args+=(--label "needs-human")
            fi

            gh issue create --repo "$REPO" --title "$title" --body "$body" "${issue_args[@]}" >/dev/null
          }

          RAW_LOGS=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>&1 || true)
          if [ -z "$RAW_LOGS" ]; then
            RAW_LOGS="(no failed-step logs found — see run logs)"
          fi

          CLASSIFICATION_JSON=$(printf '%s' "$RAW_LOGS" | .workflow-helpers/scripts/classify-ci-failure.sh)
          FAILURE_TYPE=$(printf '%s' "$CLASSIFICATION_JSON" | jq -r '.category')
          CLASSIFIER_CONFIDENCE=$(printf '%s' "$CLASSIFICATION_JSON" | jq -r '.confidence')
          CLASSIFIER_ACTION=$(printf '%s' "$CLASSIFICATION_JSON" | jq -r '.suggested_action')
          CATEGORY_LABEL=""
          if [ "$FAILURE_TYPE" != "unknown" ]; then
            CATEGORY_LABEL="ci-${FAILURE_TYPE}"
          fi

          if [ "$CLASSIFIER_CONFIDENCE" != "high" ]; then
            FAILURE_TYPE="unknown"
            CATEGORY_LABEL="ci-unknown"
            CLASSIFIER_ACTION="fix"
          fi

          # Get changed files for hypothesis generation (PR-only)
          PR_NUMBER=$(printf '%s' "$PULL_REQUESTS_JSON" | jq -r '.[0].number // empty')
          CHANGED_FILE_LIST=""
          if [ -n "$PR_NUMBER" ]; then
            CHANGED_FILE_LIST=$(gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only 2>/dev/null || true)
          fi

          if [ -n "$CHANGED_FILE_LIST" ]; then
            FAILURE_JSON=$(printf '%s' "$RAW_LOGS" | scripts/extract-failure-context.sh --changed-files "$CHANGED_FILE_LIST")
          else
            FAILURE_JSON=$(printf '%s' "$RAW_LOGS" | scripts/extract-failure-context.sh)
          fi
          FAILURE_SIGNATURE=$(printf '%s' "$FAILURE_JSON" | jq -r '.failure_signature')
          FAILURE_SUMMARY=$(printf '%s' "$FAILURE_JSON" | jq -r '.summary')
          FAILURE_EXCERPT=$(printf '%s' "$FAILURE_JSON" | jq -r '.excerpt')
          HYPOTHESIS=$(printf '%s' "$FAILURE_JSON" | jq -r '.hypothesis // empty')
          CORRELATED_FILES_JSON=$(printf '%s' "$FAILURE_JSON" | jq -r 'if .correlated_files then (.correlated_files | join(", ")) else empty end')
          SHORT_SUMMARY=$(printf '%.80s' "$FAILURE_SUMMARY")

          if [ -z "$PR_NUMBER" ]; then
            if [ "${HEALING_PAUSED:-false}" = "true" ]; then
              TITLE="[CI Incident] ${HEAD_BRANCH} ${WORKFLOW_NAME} ${FAILURE_TYPE} failure: ${SHORT_SUMMARY}"
              BODY=$(render_incident_body \
                "Autonomous healing is paused via PIPELINE_HEALING_ENABLED, so no auto-dispatchable pipeline repair issue was created." \
                "- **Branch**: \`${HEAD_BRANCH}\`")
              DRILL_ID=$(extract_drill_id)
              BODY=$(append_drill_metadata "$BODY" "$DRILL_ID")
              create_or_update_incident_issue "$TITLE" "$BODY"
              exit 0
            fi

            if [ "$CLASSIFIER_ACTION" = "escalate" ]; then
              TITLE="[CI Incident] main ${WORKFLOW_NAME} ${FAILURE_TYPE} failure: ${SHORT_SUMMARY}"
              BODY=$(render_incident_body \
                "The deterministic CI classifier marked this failure as requiring human intervention, so no repair issue was created." \
                "- **Branch**: \`${HEAD_BRANCH}\`")
              DRILL_ID=$(extract_drill_id)
              BODY=$(append_drill_metadata "$BODY" "$DRILL_ID")
              create_or_update_incident_issue "$TITLE" "$BODY"
              exit 0
            fi

            TITLE="[Pipeline] CI Failure (${FAILURE_TYPE}): ${SHORT_SUMMARY}"
            BODY=$(printf '%s\n' \
              "## CI Build Failure on \`main\`" \
              "" \
              "- **Run**: ${RUN_URL}" \
              "- **Branch**: \`${HEAD_BRANCH}\`" \
              "- **Commit**: \`${HEAD_SHA}\`" \
              "- **Workflow**: ${WORKFLOW_NAME}" \
              "- **Failure Type**: ${FAILURE_TYPE}" \
              "- **Failure Signature**: \`${FAILURE_SIGNATURE}\`" \
              "" \
              "### Failure Summary" \
              "${FAILURE_SUMMARY}" \
              "" \
              "### Failed-Step Excerpt" \
              '```text' \
              "${FAILURE_EXCERPT}" \
              '```' \
              "" \
              "> This issue was created automatically by the CI Failure Router workflow.")
            ISSUE_ARGS=()
            for label in pipeline bug automation "${CATEGORY_LABEL:-}"; do
              [ -n "$label" ] || continue
              if has_label "$label"; then
                ISSUE_ARGS+=(--label "$label")
              fi
            done
            # Use GH_AW_GITHUB_TOKEN so the issue creation triggers auto-dispatch.yml.
            # GITHUB_TOKEN events are suppressed by GitHub's anti-cascade rule and
            # would silently prevent the self-healing loop from continuing.
            if [ -n "$GH_AW_GITHUB_TOKEN" ]; then
              ISSUE_TOKEN="$GH_AW_GITHUB_TOKEN"
            else
              ISSUE_TOKEN="$GH_TOKEN"
              echo "::warning::GH_AW_GITHUB_TOKEN is not set; falling back to GITHUB_TOKEN. Issues created with GITHUB_TOKEN do not trigger the issues:opened event (GitHub anti-cascade rule), so auto-dispatch.yml will NOT fire and the self-healing loop will not continue automatically."
              WARNING_LINE='> ⚠️ **Self-healing loop disabled**: This issue was created with `GITHUB_TOKEN` because the `GH_AW_GITHUB_TOKEN` secret is not configured. GitHub'"'"'s anti-cascade rule suppresses the `issues:opened` event for workflow-actor tokens, so `auto-dispatch.yml` will **not** trigger automatically. Configure `GH_AW_GITHUB_TOKEN` (a PAT with `repo` and `workflow` scopes) to restore the self-healing loop.'
              BODY=$(printf '%s\n\n%s\n' "$BODY" "$WARNING_LINE")
            fi
            DRILL_ID=$(extract_drill_id)
            BODY=$(append_drill_metadata "$BODY" "$DRILL_ID")
            EXISTING=$(GH_TOKEN="$ISSUE_TOKEN" gh issue list --repo "$REPO" --state open --limit 200 --json number,title \
              | jq -r --arg title "$TITLE" '.[] | select(.title == $title) | .number' | head -1)
            if [ -n "$EXISTING" ]; then
              GH_TOKEN="$ISSUE_TOKEN" gh issue comment "$EXISTING" --repo "$REPO" --body "$BODY" > /dev/null || true
            else
              GH_TOKEN="$ISSUE_TOKEN" gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" "${ISSUE_ARGS[@]}" > /dev/null
            fi
            exit 0
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json number,title,body,state,headRefOid,headRefName,url)
          PR_STATE=$(printf '%s' "$PR_JSON" | jq -r '.state')
          PR_TITLE=$(printf '%s' "$PR_JSON" | jq -r '.title')
          CURRENT_HEAD_SHA=$(printf '%s' "$PR_JSON" | jq -r '.headRefOid')
          CURRENT_HEAD_BRANCH=$(printf '%s' "$PR_JSON" | jq -r '.headRefName')
          PR_URL=$(printf '%s' "$PR_JSON" | jq -r '.url')

          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR #${PR_NUMBER} is ${PR_STATE}; treating failure as superseded."
            exit 0
          fi

          if [ "$CURRENT_HEAD_SHA" != "$HEAD_SHA" ]; then
            echo "PR #${PR_NUMBER} head moved from ${HEAD_SHA} to ${CURRENT_HEAD_SHA}; treating failure as stale."
            exit 0
          fi

          HEAD_BRANCH=$CURRENT_HEAD_BRANCH

          # Fetch the PR diff (truncated) so the agent has immediate context
          FULL_DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO" 2>/dev/null || true)
          DIFF_LINES=$(printf '%s\n' "$FULL_DIFF" | wc -l | tr -d '[:space:]')
          if [ "$DIFF_LINES" -gt 200 ]; then
            PR_DIFF="$(printf '%s\n' "$FULL_DIFF" | head -200)"
            PR_DIFF=$(printf '%s\n%s\n' "$PR_DIFF" "... (truncated at 200/${DIFF_LINES} lines — run \`gh pr diff ${PR_NUMBER}\` for full diff)")
          else
            PR_DIFF="$FULL_DIFF"
          fi
          unset FULL_DIFF

          if ! printf '%s' "$PR_TITLE" | grep -q '^\[Pipeline\]'; then
            TITLE="[CI Incident] PR #${PR_NUMBER} ${WORKFLOW_NAME} CI Failure: ${SHORT_SUMMARY}"
            BODY=$(render_incident_body \
              "The failing PR is not a [Pipeline] PR, so it is not eligible for automatic repair." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          LINKED_ISSUE=$(printf '%s' "$PR_JSON" | jq -r '.body // ""' \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
            | head -1 || true)
          if [ -z "$LINKED_ISSUE" ]; then
            TITLE="[CI Incident] PR #${PR_NUMBER} ${WORKFLOW_NAME} CI Failure: ${SHORT_SUMMARY}"
            BODY=$(render_incident_body \
              "The failing [Pipeline] PR has no linked source issue in its PR body." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          EXISTING_STATE_JSON=$(find_marker_comment "$PR_NUMBER" "$STATE_MARKER" "$WORKFLOW_NAME")
          STATE_COMMENT_ID=$(printf '%s' "$EXISTING_STATE_JSON" | jq -r '.id // empty')
          STATE_COMMENT_BODY=$(printf '%s' "$EXISTING_STATE_JSON" | jq -r '.body // empty')
          EXISTING_STATUS=$(read_marker_field "$STATE_COMMENT_BODY" status)
          EXISTING_HEAD_SHA=$(read_marker_field "$STATE_COMMENT_BODY" head_sha)
          EXISTING_WORKFLOW_NAME=$(read_marker_field "$STATE_COMMENT_BODY" workflow_name)

          if [ "$EXISTING_HEAD_SHA" = "$HEAD_SHA" ] && [ "$EXISTING_WORKFLOW_NAME" = "$WORKFLOW_NAME" ] && { [ "$EXISTING_STATUS" = "dispatched" ] || [ "$EXISTING_STATUS" = "repairing" ]; }; then
            echo "Repair incident already active for PR #${PR_NUMBER} at ${HEAD_SHA}; skipping duplicate dispatch."
            exit 0
          fi

          DETECTED_STATE=$(render_state_body detected "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
          upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$DETECTED_STATE"
          sync_pr_repair_labels
          if [ -n "${CATEGORY_LABEL:-}" ]; then
            add_pr_label "$CATEGORY_LABEL"
          fi

          if [ "$CLASSIFIER_ACTION" = "escalate" ]; then
            ESCALATED_STATE=$(render_state_body escalated "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
            upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$ESCALATED_STATE"
            sync_pr_repair_labels
            add_issue_label "$LINKED_ISSUE" "needs-human"
            TITLE="[CI Incident] Escalation: PR #${PR_NUMBER} ${WORKFLOW_NAME} ${FAILURE_TYPE} failure"
            BODY=$(render_incident_body \
              "The deterministic CI classifier marked this failure as requiring human intervention, so no repair command was posted." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`\n- **Linked Issue**: #${LINKED_ISSUE}")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          if [ "${HEALING_PAUSED:-false}" = "true" ]; then
            ESCALATED_STATE=$(render_state_body escalated "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
            upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$ESCALATED_STATE"
            sync_pr_repair_labels
            TITLE="[CI Incident] Escalation: PR #${PR_NUMBER} ${WORKFLOW_NAME} healing paused"
            BODY=$(render_incident_body \
              "Autonomous healing is paused via PIPELINE_HEALING_ENABLED, so the router recorded the incident but did not post a repair command." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`\n- **Linked Issue**: #${LINKED_ISSUE}")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          COMMAND_EXISTS=$(gh api "/repos/${REPO}/issues/${LINKED_ISSUE}/comments?per_page=100" 2>/dev/null \
            | jq -r --arg pr "$PR_NUMBER" --arg sha "$HEAD_SHA" --arg workflow "$WORKFLOW_NAME" --arg marker "$COMMAND_MARKER" \
              '[.[] | select(.body | contains($marker) and contains("pr_number=" + $pr) and contains("head_sha=" + $sha) and contains("workflow_name=" + $workflow))] | length')
          if [ "${COMMAND_EXISTS:-0}" -gt 0 ]; then
            DISPATCHED_STATE=$(render_state_body dispatched "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
            upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$DISPATCHED_STATE"
            sync_pr_repair_labels
            echo "Repair command already exists for issue #${LINKED_ISSUE}; skipping duplicate post."
            exit 0
          fi

          if [ -z "${GH_AW_GITHUB_TOKEN:-}" ]; then
            ESCALATED_STATE=$(render_state_body escalated "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
            upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$ESCALATED_STATE"
            sync_pr_repair_labels
            TITLE="[CI Incident] Escalation: PR #${PR_NUMBER} ${WORKFLOW_NAME} repeated CI failure"
            BODY=$(render_incident_body \
              "GH_AW_GITHUB_TOKEN is unavailable, so the router could not post the repair command that triggers the owning agent." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`\n- **Linked Issue**: #${LINKED_ISSUE}")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          # Determine owning agent command from PR branch prefix
          if printf '%s' "$HEAD_BRANCH" | grep -q '^frontend-agent/'; then
            REPAIR_AGENT_CMD="/frontend-agent"
          else
            REPAIR_AGENT_CMD="/repo-assist"
          fi

          COMMAND_ARGS=(
            --agent-command "$REPAIR_AGENT_CMD"
            --pr-number "$PR_NUMBER"
            --linked-issue "$LINKED_ISSUE"
            --head-sha "$HEAD_SHA"
            --head-branch "$HEAD_BRANCH"
            --workflow-name "$WORKFLOW_NAME"
            --failure-run-id "$RUN_ID"
            --failure-run-url "$RUN_URL"
            --failure-type "$FAILURE_TYPE"
            --failure-signature "$FAILURE_SIGNATURE"
            --attempt-count 1
            --failure-summary "$FAILURE_SUMMARY"
            --failure-excerpt "$FAILURE_EXCERPT"
            --pr-diff "$PR_DIFF"
          )
          if [ -n "${HYPOTHESIS:-}" ]; then
            COMMAND_ARGS+=(--hypothesis "$HYPOTHESIS")
          fi
          if [ -n "${CORRELATED_FILES_JSON:-}" ]; then
            COMMAND_ARGS+=(--correlated-files "$CORRELATED_FILES_JSON")
          fi
          COMMAND_BODY=$(scripts/render-ci-repair-command.sh "${COMMAND_ARGS[@]}")

          if ! GH_TOKEN="$GH_AW_GITHUB_TOKEN" gh issue comment "$LINKED_ISSUE" --repo "$REPO" --body "$COMMAND_BODY" >/dev/null; then
            echo "::warning::Repair command dispatch failed for issue #${LINKED_ISSUE}"
            ESCALATED_STATE=$(render_state_body escalated "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
            upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$ESCALATED_STATE"
            sync_pr_repair_labels
            TITLE="[CI Incident] Escalation: PR #${PR_NUMBER} ${WORKFLOW_NAME} repeated CI failure"
            BODY=$(render_incident_body \
              "Router could not post the repair command that triggers the owning agent on the linked source issue." \
              "- **PR**: #${PR_NUMBER} (${PR_URL})\n- **Branch**: \`${HEAD_BRANCH}\`\n- **Linked Issue**: #${LINKED_ISSUE}")
            create_or_update_incident_issue "$TITLE" "$BODY"
            exit 0
          fi

          DISPATCHED_STATE=$(render_state_body dispatched "$LINKED_ISSUE" 1 "$FAILURE_TYPE" "$FAILURE_SIGNATURE" "$FAILURE_SUMMARY" "$FAILURE_EXCERPT")
          upsert_comment "$GH_TOKEN" "$PR_NUMBER" "$STATE_COMMENT_ID" "$DISPATCHED_STATE"
          sync_pr_repair_labels
          echo "Posted repair command for PR #${PR_NUMBER} on issue #${LINKED_ISSUE}."
