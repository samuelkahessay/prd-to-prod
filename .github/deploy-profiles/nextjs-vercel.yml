# Deploy Profile: Next.js on Vercel
# Read by prd-decomposer and repo-assist to configure CI/CD for this stack.
stack: nextjs
name: "Next.js + Vercel"
app_root: web

detect:
  files: ["web/package.json", "web/next.config.*", "package.json", "next.config.*"]

build:
  runtime: node
  runtime_version: "20"
  install: 'APP_ROOT=$(bash scripts/resolve-nextjs-app-root.sh) && cd "$APP_ROOT" && npm ci'
  build: 'APP_ROOT=$(bash scripts/resolve-nextjs-app-root.sh) && cd "$APP_ROOT" && npm run build'
  test: 'APP_ROOT=$(bash scripts/resolve-nextjs-app-root.sh) && cd "$APP_ROOT" && npm test'

deploy:
  workflow: deploy-vercel.yml
  method: "Vercel CLI"
  secrets:
    - VERCEL_TOKEN
    - VERCEL_ORG_ID
    - VERCEL_PROJECT_ID

ci:
  workflow: ci-node.yml
  name: "Node CI"
